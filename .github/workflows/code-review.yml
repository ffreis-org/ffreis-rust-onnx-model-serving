name: Code Review (Lint + Test)

on:
  pull_request:
    branches: [ main ]
    paths:
      - "app/**"
      - "docs/openapi.yaml"
      - "scripts/check_openapi.py"
      - "scripts/check_openapi_drift.py"
      - "scripts/check_coverage.py"
      - "scripts/check_coverage_per_file.py"
      - "scripts/check_e2e_tests.py"
      - "Makefile"
      - "rust-toolchain.toml"
      - ".github/workflows/code-review.yml"
  push:
    branches: [ main ]
    paths:
      - "app/**"
      - "docs/openapi.yaml"
      - "scripts/check_openapi.py"
      - "scripts/check_openapi_drift.py"
      - "scripts/check_coverage.py"
      - "scripts/check_coverage_per_file.py"
      - "scripts/check_e2e_tests.py"
      - "Makefile"
      - "rust-toolchain.toml"
      - ".github/workflows/code-review.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        shell: bash

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b
        with:
          enable-cache: true

      - name: Install Rust (fmt + clippy)
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
          components: rustfmt, clippy, llvm-tools-preview

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          workspaces: |
            app -> target

      - name: Lint
        run: |
          set -euo pipefail
          make -C app lint

      - name: OpenAPI contract check
        run: |
          set -euo pipefail
          make openapi-check

      - name: OpenAPI drift check
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi
          make openapi-drift-check BASE_SHA="$BASE_SHA" HEAD_SHA="$HEAD_SHA"

      - name: Install cargo-llvm-cov
        run: |
          set -euo pipefail
          cargo install cargo-llvm-cov --locked

      - name: Install Python deps for coverage
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install defusedxml

      - name: Build (Makefile)
        run: |
          set -euo pipefail
          make -C app build

      - name: Unit tests
        run: |
          set -euo pipefail
          make -C app test-unit

      - name: Integration tests
        run: |
          set -euo pipefail
          make -C app test-integration

      - name: E2E smoke tests (non-ignored)
        run: |
          set -euo pipefail
          make -C app test-e2e

      - name: E2E minimum scenarios gate
        run: |
          set -euo pipefail
          make -C app check-e2e-min E2E_MIN_TESTS=3

      - name: Integration and E2E coverage thresholds
        run: |
          set -euo pipefail
          make -C app coverage-segment-check INTEGRATION_COVERAGE_MIN=57 E2E_COVERAGE_MIN=45

      - name: Coverage threshold
        run: |
          set -euo pipefail
          make -C app coverage-check
