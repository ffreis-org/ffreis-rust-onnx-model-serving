name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  schedule:
    - cron: "32 18 5 * *"  # monthly scattered (was: 0 0 * * 1)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@b4d4d5ad74c44cc758be8cbed14720747e97adfc # v1.6.0
    with:
      languages: "python,ruby"
