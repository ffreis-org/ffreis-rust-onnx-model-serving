name: Build All

on:
  workflow_dispatch:
    inputs:
      build_macos:
        description: "Also build on macOS (10x Actions billing — manual cross-platform check only)"
        type: boolean
        default: false
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main ]
    paths:
      - "app/**"
      - "scripts/check_e2e_tests.py"
      - "Makefile"
      - "rust-toolchain.toml"
      - ".github/workflows/build-all.yml"
  push:
    branches: [ main ]
    paths:
      - "app/**"
      - "scripts/check_e2e_tests.py"
      - "Makefile"
      - "rust-toolchain.toml"
      - ".github/workflows/build-all.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  matrix-build:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
      # PR builds the primary version only (cost). Full version matrix runs on
      # push/schedule and on manual workflow_dispatch (pair with build_macos=true
      # for the full cross-platform x cross-version compatibility proof).
        rust: ${{ fromJson( github.event_name == 'pull_request' && '["stable"]' || '["1.88.0","stable"]' ) }}
      # COST GUARD: macOS Actions minutes bill 10x and every artifact here is
      # Linux-only (arm64 Lambdas / Linux containers), so macOS is OFF in the
      # normal push/PR/schedule flow. It runs ONLY via manual workflow_dispatch
      # with build_macos=true. Do NOT hardcode "macos-latest" back here — that
      # silently restores the 10x drain on every run (CI cost incident 2026-06).
        os: ${{ fromJson( (github.event_name == 'workflow_dispatch' && inputs.build_macos) && '["ubuntu-latest","macos-latest"]' || '["ubuntu-latest"]' ) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: ${{ matrix.rust }}
      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          workspaces: |
            app -> target
      - name: Build
        run: |
          set -euo pipefail
          make -C app build

  unit-tests:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    needs: matrix-build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          workspaces: |
            app -> target
      - name: Run unit tests
        run: |
          set -euo pipefail
          make -C app test-unit

  integration-tests:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    needs: matrix-build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          workspaces: |
            app -> target
      - name: Run integration tests
        run: |
          set -euo pipefail
          make grpc-check
          make test-grpc-parity
          make -C app test-integration

  e2e-smoke:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    needs: matrix-build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          workspaces: |
            app -> target
      - name: Run e2e smoke tests (non-ignored)
        run: |
          set -euo pipefail
          make -C app test-e2e
      - name: Enforce minimum e2e scenarios
        run: |
          set -euo pipefail
          make -C app check-e2e-min E2E_MIN_TESTS=3

  container-smoke:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    needs: matrix-build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Podman
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y podman
      - name: Build images
        run: |
          set -euo pipefail
          make build

  pr-summary:
    name: PR Summary
    if: always()
    needs: [matrix-build, unit-tests, integration-tests, e2e-smoke, container-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions: {}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Fail if any dependency failed/cancelled
        run: |
          set -euo pipefail
          echo "matrix-build result: ${{ needs.matrix-build.result }}"
          echo "unit-tests result: ${{ needs.unit-tests.result }}"
          echo "integration-tests result: ${{ needs.integration-tests.result }}"
          echo "e2e-smoke result: ${{ needs.e2e-smoke.result }}"
          echo "container-smoke result: ${{ needs.container-smoke.result }}"

          if [[ "${{ needs.matrix-build.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.integration-tests.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.e2e-smoke.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.container-smoke.result }}" != "success" ]]; then exit 1; fi

          echo "All checks passed."
