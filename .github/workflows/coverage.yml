name: Code Coverage (Codecov)

on:
  pull_request:
    branches: [ main ]
    paths:
      - "app/**"
      - "scripts/check_coverage.py"
      - "scripts/check_coverage_per_file.py"
      - "Makefile"
      - "rust-toolchain.toml"
      - ".github/workflows/coverage.yml"
  push:
    branches: [ main ]
    paths:
      - "app/**"
      - "scripts/check_coverage.py"
      - "scripts/check_coverage_per_file.py"
      - "Makefile"
      - "rust-toolchain.toml"
      - ".github/workflows/coverage.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          workspaces: |
            app -> target

      - name: Install cargo-llvm-cov
        run: |
          set -euo pipefail
          cargo install cargo-llvm-cov --locked

      - name: Install Python deps for coverage
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install defusedxml

      - name: Generate coverage (Makefile)
        run: |
          set -euo pipefail
          make -C app coverage
          test -s coverage/cobertura.xml

      - name: Generate lcov coverage for SonarCloud
        run: |
          set -euo pipefail
          make -C app coverage-lcov
          test -s coverage/lcov.info

      - name: Integration and E2E coverage thresholds
        run: |
          set -euo pipefail
          make -C app coverage-segment-check INTEGRATION_COVERAGE_MIN=57 E2E_COVERAGE_MIN=45

      - name: Check Codecov token availability
        id: codecov_gate
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.CODECOV_TOKEN }}" ]]; then
            if [[ "${{ github.event_name }}" == "push" ]]; then
              echo "::error::CODECOV_TOKEN secret is required for push coverage uploads."
              exit 1
            fi
            echo "CODECOV_TOKEN not available (likely fork PR); skipping upload."
            echo "skip_upload=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_upload=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload coverage to Codecov
        if: steps.codecov_gate.outputs.skip_upload != 'true'
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/cobertura.xml
          fail_ci_if_error: true
          verbose: true
