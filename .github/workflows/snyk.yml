name: Security Scan (Snyk)

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main ]
    paths:
      - "app/**"
      - "container/**"
      - "Makefile"
      - ".github/workflows/snyk.yml"
  push:
    branches: [ main ]
    paths:
      - "app/**"
      - "container/**"
      - "Makefile"
      - ".github/workflows/snyk.yml"
  schedule:
    - cron: "19 0 1 * *"  # monthly scattered (was: 0 10 * * 1)

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  snyk:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable

      - name: Setup Node.js (for Snyk CLI)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install Snyk CLI
        run: |
          set -euo pipefail
          npm install -g snyk
          snyk --version

      - name: Snyk Open Source scan (Cargo)
        id: snyk_oss
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p snyk-results
          set +e
          snyk test \
            --file=app/Cargo.toml \
            --package-manager=cargo \
            --sarif-file-output=snyk-results/oss.sarif
          snyk_status=$?
          set -e

          if [ -s snyk-results/oss.sarif ]; then
            echo "oss_sarif=true" >> "$GITHUB_OUTPUT"
          else
            echo "oss_sarif=false" >> "$GITHUB_OUTPUT"
            echo "Snyk OSS SARIF was not generated (status=${snyk_status}); skipping OSS upload."
          fi

      - name: Snyk Code scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set -euo pipefail
          snyk code test --sarif-file-output=snyk-results/code.sarif || true
          test -s snyk-results/code.sarif

      - name: Upload Snyk OSS SARIF
        if: steps.snyk_oss.outputs.oss_sarif == 'true'
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: snyk-results/oss.sarif
          category: snyk-oss

      - name: Upload Snyk Code SARIF
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: snyk-results/code.sarif
          category: snyk-code
