name: Container Vulnerability Scan (Grype)

permissions: {}

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "app/**"
      - "container/**"
      - "Makefile"
      - ".github/workflows/grype.yml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main ]
    paths:
      - "app/**"
      - "container/**"
      - "Makefile"
      - ".github/workflows/grype.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  grype:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Podman
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Start Podman socket
        run: |
          set -euo pipefail
          podman system service --time=0 &
          SOCKET_PATH="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/podman/podman.sock"
          timeout 10 bash -c "until test -S \"${SOCKET_PATH}\"; do sleep 0.5; done"
          echo "Podman socket ready at ${SOCKET_PATH}"

      - name: Build images (local)
        run: |
          set -euo pipefail
          CONTAINER_COMMAND=podman make build

      - name: Start Podman socket
        run: |
          set -euo pipefail
          systemctl --user start podman.socket
          PODMAN_SOCK="${XDG_RUNTIME_DIR}/podman/podman.sock"
          end=$((SECONDS + 30))
          while [ "$SECONDS" -lt "$end" ]; do
            [ -S "$PODMAN_SOCK" ] && break
            sleep 0.5
          done
          [ -S "$PODMAN_SOCK" ] || { echo "Podman socket did not start within 30s"; exit 1; }
          echo "Podman socket ready at $PODMAN_SOCK"

      - name: Install Grype
        run: |
          set -euo pipefail

          PINNED_COMMIT="c6a67581ab4e7aa494351b919326ad6606af3010"
          SCRIPT_URL="https://raw.githubusercontent.com/anchore/grype/${PINNED_COMMIT}/install.sh"

          mkdir -p ./bin
          curl --fail --show-error --silent --location \
            --proto '=https' --proto-redir '=https' \
            "$SCRIPT_URL" -o /tmp/grype-install.sh

          grep -q "grype" /tmp/grype-install.sh

          sh /tmp/grype-install.sh -b ./bin
          ./bin/grype version
      - name: Grype scan (SARIF)
        run: |
          set -euo pipefail
          mkdir -p grype-results

          # Write grype ignore policy:
          # - Exclude cargo registry dir (downloaded dep source code with their own
          #   Cargo.lock files) to suppress false positives from build-only toolchain.
          # - Suppress known OS CVE until ubuntu:resolute base image digest is updated
          #   (CVE-2026-45447: libssl3t64 3.5.3→3.5.5; track in chore/update-base-image).
          # libssl3t64 3.5.3-1ubuntu2 → fixed in 3.5.5-1ubuntu3.2
          # Blocked on ubuntu:resolute base image digest update (chore/update-base-image).
          cat > .grype.yaml << 'GRYPE_EOF'
          ignore:
            - vulnerability: CVE-2026-45447
              package:
                name: libssl3t64
                type: deb
            - vulnerability: CVE-2026-45447
              package:
                name: openssl-provider-legacy
                type: deb
          GRYPE_EOF

          images=(ffreis/base ffreis/base-builder ffreis/builder ffreis/base-runner ffreis/runner)

          for image in "${images[@]}"; do
            name="${image##*/}"
            out="grype-results/${name}.sarif"

            # Capture exit code: grype returns 2 when HIGH/CRITICAL found (--fail-on high).
            # Write gate-status so the upload step still runs even with findings.
            # --exclude skips the cargo registry cache (downloaded dep source code with
            # their own Cargo.lock files) to avoid false positives from transitive deps
            # of build-only toolchain packages. The project's build/Cargo.lock is still scanned.
            if ./bin/grype "podman:${image}" \
              --exclude "home/appuser/.cargo/registry/**" \
              -o sarif --file "$out" --fail-on high; then
              echo "PASS" > "grype-results/${name}.gate-status"
            else
              exit_code=$?
              if [ "$exit_code" -eq 2 ]; then
                echo "FAIL" > "grype-results/${name}.gate-status"
              else
                echo "::error::Grype scan for ${image} failed (exit ${exit_code})" >&2
                exit "$exit_code"
              fi
            fi

            test -s "$out"
          done

          # Gate: fail on runtime images only. Builder images contain the Rust
          # toolchain and build-only crate CVEs that do not affect the deployed
          # runtime; surface them as warnings instead.
          runtime_images=(base base-runner runner)
          is_runtime() {
            local n="$1"
            for img in "${runtime_images[@]}"; do [[ "$img" == "$n" ]] && return 0; done
            return 1
          }
          shopt -s nullglob
          failed=0
          for f in grype-results/*.gate-status; do
            img="$(basename "$f" .gate-status)"
            status="$(cat "$f")"
            if [ "$status" = "FAIL" ]; then
              if is_runtime "$img"; then
                echo "::error::Runtime image ${img} failed HIGH/CRITICAL vulnerability gate"
                failed=1
              else
                echo "::warning::Build-only image ${img} has HIGH/CRITICAL vulnerabilities (informational — fix via cargo update)"
              fi
            else
              echo "Image ${img} passed HIGH/CRITICAL vulnerability gate"
            fi
          done
          exit "$failed"
      - name: Upload Grype SARIF (per image)
        if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) && hashFiles('grype-results/*.sarif') != '' }}
        run: |
          set -euo pipefail
          for f in grype-results/*.sarif; do
            name="$(basename "$f" .sarif)"
            echo "Uploading $f with tool_name grype-$name"
            sarif_payload="$(gzip -c "$f" | base64 | tr -d '\n')"

            gh api \
              -X POST \
              "/repos/${GH_REPO}/code-scanning/sarifs" \
              -f sarif="${sarif_payload}" \
              -f tool_name="grype-${name}" \
              -f commit_sha="${GH_SHA}" \
              -f ref="${GH_REF}"
          done
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
          GH_REF: ${{ github.ref }}
