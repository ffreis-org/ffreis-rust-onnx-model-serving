name: Container Vulnerability Scan (Trivy)

permissions: {}

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main ]
    paths:
      - "app/**"
      - "container/**"
      - ".trivyignore.yaml"
      - "Makefile"
      - ".github/workflows/trivy.yml"
  push:
    branches: [ main ]
    paths:
      - "app/**"
      - "container/**"
      - ".trivyignore.yaml"
      - "Makefile"
      - ".github/workflows/trivy.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  image-scan:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Podman
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y podman
      - name: Start Podman socket
        run: |
          set -euo pipefail
          podman system service --time=0 &
          SOCKET_PATH="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/podman/podman.sock"
          timeout 10 bash -c "until test -S \"${SOCKET_PATH}\"; do sleep 0.5; done"
          echo "Podman socket ready at ${SOCKET_PATH}"
      - name: Build images
        run: |
          set -euo pipefail
          CONTAINER_COMMAND=podman make build
      - name: Start Podman socket
        run: |
          set -euo pipefail
          systemctl --user start podman.socket
          PODMAN_SOCK="${XDG_RUNTIME_DIR}/podman/podman.sock"
          end=$((SECONDS + 30))
          while [ "$SECONDS" -lt "$end" ]; do
            [ -S "$PODMAN_SOCK" ] && break
            sleep 0.5
          done
          [ -S "$PODMAN_SOCK" ] || { echo "Podman socket did not start within 30s"; exit 1; }
          echo "Podman socket ready at $PODMAN_SOCK"
      - name: Install Trivy
        run: |
          set -euo pipefail
          TRIVY_VERSION="${TRIVY_VERSION:-v0.67.2}"
          TRIVY_URL="$(python3 .github/scripts/get_trivy_url.py "${TRIVY_VERSION}")"
          TRIVY_TARBALL="$(basename "${TRIVY_URL}")"

          curl -fsSL --proto '=https' --proto-redir '=https' "${TRIVY_URL}" -o "${TRIVY_TARBALL}"
          tar -xzf "${TRIVY_TARBALL}" trivy
          sudo install -m 0755 trivy /usr/local/bin/trivy

      - name: Verify Trivy installation
        run: |
          set -euo pipefail
          trivy --version
      - name: Scan images (sequential, Podman)
        run: |
          set -euo pipefail
          mkdir -p trivy-results
          images=(ffreis/base ffreis/base-builder ffreis/builder ffreis/base-runner ffreis/runner)

          # Download DB once. Scans run sequentially to avoid Trivy cache/DB lock
          # contention: parallel trivy processes share the same ~/.cache/trivy FS
          # lock and time out against each other when more than one process runs
          # concurrently on the same runner (Trivy issue: database-and-cache-lock-errors).
          trivy image --download-db-only --no-progress

          scan_image() {
            image="$1"
            name="${image##*/}"
            # 1) Always produce SARIF for all severities so GitHub code scanning
            # has complete visibility, regardless of pass/fail gate outcome.
            trivy image \
              --image-src podman \
              --skip-db-update \
              --no-progress \
              --ignorefile .trivyignore.yaml \
              --scanners vuln \
              --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL \
              --ignore-unfixed \
              --exit-code 0 \
              --format sarif \
              --output "trivy-results/${name}.sarif" \
              "$image"
            test -s "trivy-results/${name}.sarif"

            # 1b) Export JSON for trend analysis and triage automation.
            trivy image \
              --image-src podman \
              --skip-db-update \
              --no-progress \
              --ignorefile .trivyignore.yaml \
              --scanners vuln \
              --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL \
              --ignore-unfixed \
              --exit-code 0 \
              --format json \
              --output "trivy-results/${name}.json" \
              "$image"
            test -s "trivy-results/${name}.json"

            # 2) Print a human-readable full report in CI logs (all severities).
            echo "Full vulnerability report for ${image} (all severities):"
            trivy image \
              --image-src podman \
              --skip-db-update \
              --no-progress \
              --ignorefile .trivyignore.yaml \
              --scanners vuln \
              --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL \
              --ignore-unfixed \
              --exit-code 0 \
              --format table \
              "$image"

            # 3) Check for HIGH/CRITICAL vulnerabilities but capture exit status
            # instead of failing immediately so reports can be uploaded.
            # Note: not using --ignore-unfixed here to ensure all HIGH/CRITICAL findings
            # (fixed or unfixed) are gated. Use .trivyignore.yaml for explicit suppressions.
            echo "Gating ${image} on HIGH/CRITICAL vulnerabilities..."
            if ! trivy image \
              --image-src podman \
              --skip-db-update \
              --no-progress \
              --ignorefile .trivyignore.yaml \
              --scanners vuln \
              --severity HIGH,CRITICAL \
              --exit-code 1 \
              --format table \
              "$image"; then
              echo "FAIL" > "trivy-results/${name}.gate-status"
            else
              echo "PASS" > "trivy-results/${name}.gate-status"
            fi
          }

          for image in "${images[@]}"; do
            scan_image "$image"
          done
      - name: Upload Trivy JSON reports
        if: always() && hashFiles('trivy-results/*.json') != ''
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: trivy-json-reports
          path: trivy-results/*.json
          if-no-files-found: ignore
      - name: Upload Trivy SARIF (per image)
        if: always() && hashFiles('trivy-results/*.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in trivy-results/*.sarif; do
            name="$(basename "$f" .sarif)"
            echo "Uploading $f with tool_name trivy-$name"
            sarif_payload="$(gzip -c "$f" | base64 | tr -d '\n')"
            gh api \
              -X POST \
              "/repos/${GH_REPO}/code-scanning/sarifs" \
              -f sarif="${sarif_payload}" \
              -f tool_name="trivy-${name}" \
              -f commit_sha="${GH_SHA}" \
              -f ref="${GH_REF}"
          done
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
          GH_REF: ${{ github.ref }}
      - name: Check gate results
        if: always() && hashFiles('trivy-results/*.gate-status') != ''
        run: |
          set -euo pipefail
          shopt -s nullglob
          failed=0
          gate_files=(trivy-results/*.gate-status)
          if [ ${#gate_files[@]} -eq 0 ]; then
            echo "::error::No gate status files found - scans may not have completed"
            exit 1
          fi
          # Only gate (fail) on runtime images that are deployed.
          # Builder images contain the Rust toolchain and build-only crate CVEs
          # that do not affect the production runtime; they are surfaced as warnings.
          runtime_images=(base base-runner runner)
          is_runtime() {
            local n="$1"
            for img in "${runtime_images[@]}"; do [[ "$img" == "$n" ]] && return 0; done
            return 1
          }
          for f in "${gate_files[@]}"; do
            name="$(basename "$f" .gate-status)"
            status="$(cat "$f")"
            if [ "$status" = "FAIL" ]; then
              if is_runtime "$name"; then
                echo "::error::Runtime image ${name} failed HIGH/CRITICAL vulnerability gate"
                failed=1
              else
                echo "::warning::Build-only image ${name} has HIGH/CRITICAL vulnerabilities (informational — fix via cargo update)"
              fi
            elif [ "$status" = "PASS" ]; then
              echo "Image ${name} passed HIGH/CRITICAL vulnerability gate"
            else
              echo "::error::Image ${name} has unexpected gate status: ${status}"
              failed=1
            fi
          done
          exit $failed
      - name: Skip gate check when scans did not produce status files
        if: always() && hashFiles('trivy-results/*.gate-status') == ''
        run: |
          echo "No Trivy gate status files were produced; skipping gate check because scan phase did not complete."
