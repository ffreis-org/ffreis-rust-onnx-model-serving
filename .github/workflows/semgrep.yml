name: Security - SAST (Semgrep)

on:
  workflow_dispatch:
  schedule:
    - cron: "20 4 8 * *"  # monthly scattered (was: 0 8 * * 1)

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    permissions:
      contents: read
    uses: ffreis-org/ffreis-workflows-rust/.github/workflows/rust-semgrep.yml@main
