name: Security (cargo-audit)

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "rust-toolchain.toml"
      - ".github/workflows/code-security.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "rust-toolchain.toml"
      - ".github/workflows/code-security.yml"
  schedule:
    - cron: "0 9 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-rust/.github/workflows/rust-security.yml@f3f3acf975d34494fb6d54ad107195a8808bc722
    with:
      working-directory: "app"
      ignore-advisories: "RUSTSEC-2026-0009"
