name: Commit Checks (Lefthook)

on:
  pull_request:
    branches: [ main ]
    paths:
      - "app/**"
      - "Makefile"
      - "lefthook.yml"
      - "scripts/**"
      - ".github/workflows/commit-checks.yml"
  push:
    branches: [ main ]
    paths:
      - "app/**"
      - "Makefile"
      - "lefthook.yml"
      - "scripts/**"
      - ".github/workflows/commit-checks.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b
        with:
          enable-cache: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        run: |
          set -euo pipefail
          cargo install cargo-llvm-cov --locked

      - name: Install Python deps for coverage scripts
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install defusedxml

      - name: Commit Checks
        run: |
          set -euo pipefail
          make -C app prepush-check INTEGRATION_COVERAGE_MIN=57 E2E_COVERAGE_MIN=45 E2E_MIN_TESTS=3
