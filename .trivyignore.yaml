# Trivy ignore policy (template).
#
# Keep this file small and time-bound:
# - Prefer fixing vulnerabilities over ignoring them.
# - Always include `statement` and `expired_at`.
# - Scope ignores to specific `paths` whenever possible.
#
# Reference:
# https://trivy.dev/latest/docs/configuration/filtering/#by-finding-ids
vulnerabilities:
  - id: CVE-2026-45447
    statement: >
      Heap Use-After-Free in OpenSSL PKCS7_verify() (libssl3t64 3.5.3-1ubuntu2).
      Fixed in 3.5.5-1ubuntu3.2. Suppressed until ubuntu:resolute base image digest
      is updated to a build that includes the OpenSSL 3.5.5 package. Track in a
      separate chore/update-base-image-digest PR.
    expired_at: "2026-09-30T00:00:00Z"

  # linux-libc-dev kernel header CVEs (7.0.0-22.22) — no fix available upstream.
  # linux-libc-dev provides kernel API C headers needed to compile Rust crates that
  # link against libc. These CVEs affect the kernel itself, not the header files:
  # the running kernel is the host's kernel (not affected by the package inside the
  # container), so these findings cannot be exploited via this container image.
  # Re-review when Ubuntu releases a patched linux-libc-dev ≥ 7.0.0-22.23.
  - id: CVE-2026-31608
    statement: >
      linux-libc-dev kernel header CVE (kernel: smb: server: avoid double-free).
      No fix available in ubuntu:resolute (7.0.0-22.22); kernel CVEs in header
      packages are not exploitable inside a container — the host kernel runs on
      the host, not inside the image. Re-review when a patched linux-libc-dev is
      released.
    expired_at: "2026-12-31T00:00:00Z"
